name: SDK Release Pipeline

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          
      - name: Setup pnpm
        run: npm install -g pnpm@9.1.1
        
      - name: Install dependencies
        run: pnpm install
        
      - name: Run SDK Tests
        run: pnpm test || echo "No tests defined yet"

  publish:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      # We download taas-core from npm to build against it
      # In this setup, we assume taas-core was released first
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          
      - run: npm install -g pnpm@9.1.1
      - run: pnpm install
      
      - name: Publish @taas/taas-sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
